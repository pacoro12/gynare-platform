<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYNARE · Acceso Médico</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/platform.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand__title">GYNARE</div>
      <div class="login-brand__sub">Clínica de la Mujer</div>
      <div class="login-brand__label">Plataforma Médica — Acceso privado</div>
    </div>

    <div class="login-error" id="loginError">Correo o contraseña incorrectos.</div>

    <form id="loginForm">
      <div class="login-form__group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="usuario@gynare.com.mx" autocomplete="email" required>
      </div>
      <div class="login-form__group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div style="margin-top:24px">
        <button type="submit" class="btn btn--primary btn--full" id="loginBtn">
          Iniciar sesión
        </button>
      </div>
    </form>

    <p style="text-align:center; margin-top:24px; font-size:12px; color:var(--gray-400)">
      <a href="/" style="color:var(--plum)">← Regresar al sitio web</a>
    </p>
  </div>
</div>
<script>
  // Si ya tiene sesión, redirigir
  if (localStorage.getItem('gynare_token')) {
    window.location.href = '/platform/dashboard.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
      const resp = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await resp.json();

      if (resp.ok) {
        localStorage.setItem('gynare_token', data.token);
        localStorage.setItem('gynare_user', JSON.stringify(data.user));
        window.location.href = '/platform/dashboard.html';
      } else {
        err.textContent = data.error || 'Credenciales incorrectas';
        err.style.display = 'block';
      }
    } catch {
      err.textContent = 'Error de conexión. Intenta de nuevo.';
      err.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
    }
  });
</script>
</body>
</html>
