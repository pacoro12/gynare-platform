<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYNARE · Nueva Paciente</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/platform.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar__brand"><div class="sidebar__brand-name">GYNARE</div><div class="sidebar__brand-sub">Clínica de la Mujer</div></div>
    <nav class="sidebar__nav">
      <div class="sidebar__section">Principal</div>
      <a href="/platform/dashboard.html" class="sidebar__link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>Dashboard</a>
      <a href="/platform/citas.html" class="sidebar__link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="11.5" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M5 1.5v3M11 1.5v3M1.5 7h13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Agenda</a>
      <a href="/platform/solicitudes.html" class="sidebar__link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v3.5l2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Solicitudes Web<span class="sidebar__badge" id="webBadge" style="display:none">0</span></a>
      <div class="sidebar__section">Pacientes</div>
      <a href="/platform/pacientes.html" class="sidebar__link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M2 14c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Pacientes</a>
      <a href="/platform/nueva-paciente.html" class="sidebar__link active"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="5.5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M1 14c0-3.31 2.69-6 6-6M11 10v4M9 12h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Nueva Paciente</a>
    </nav>
    <div class="sidebar__user"><div class="sidebar__user-avatar" id="sidebarAvatar">D</div><div><div class="sidebar__user-name" id="sidebarUserName">Cargando...</div><div class="sidebar__user-role" id="sidebarUserRole">Médico</div></div><button class="sidebar__logout" onclick="logout()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <span class="topbar__title">Registrar Nueva Paciente</span>
      <div class="topbar__actions">
        <a href="/platform/pacientes.html" class="btn btn--outline btn--sm">← Cancelar</a>
      </div>
    </header>

    <div class="content">
      <form id="pacienteForm">

        <!-- Datos personales -->
        <div class="form-card">
          <div class="form-card__header"><span class="form-card__title">👤 Datos Personales</span></div>
          <div class="form-card__body">
            <div class="form-grid form-grid--3">
              <div class="form-group">
                <label>Nombre(s) *</label>
                <input type="text" name="nombre" required placeholder="María">
              </div>
              <div class="form-group">
                <label>Apellido Paterno *</label>
                <input type="text" name="apellido_paterno" required placeholder="González">
              </div>
              <div class="form-group">
                <label>Apellido Materno</label>
                <input type="text" name="apellido_materno" placeholder="López">
              </div>
              <div class="form-group">
                <label>Fecha de Nacimiento</label>
                <input type="date" name="fecha_nacimiento">
              </div>
              <div class="form-group">
                <label>Estado Civil</label>
                <select name="estado_civil">
                  <option value="">Seleccionar</option>
                  <option>Soltera</option><option>Casada</option><option>Unión libre</option>
                  <option>Divorciada</option><option>Viuda</option>
                </select>
              </div>
              <div class="form-group">
                <label>Ocupación</label>
                <input type="text" name="ocupacion" placeholder="Empleada">
              </div>
              <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" name="telefono" placeholder="(33) 1234-5678">
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="paciente@email.com">
              </div>
              <div class="form-group">
                <label>Tipo de Sangre</label>
                <select name="tipo_sangre">
                  <option value="">Desconocido</option>
                  <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                  <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
                </select>
              </div>
              <div class="form-group form-group--full">
                <label>Dirección</label>
                <input type="text" name="direccion" placeholder="Calle, número, colonia">
              </div>
              <div class="form-group">
                <label>Ciudad</label>
                <input type="text" name="ciudad" value="Guadalajara">
              </div>
              <div class="form-group">
                <label>Estado</label>
                <input type="text" name="estado" value="Jalisco">
              </div>
              <div class="form-group">
                <label>Alergias conocidas</label>
                <input type="text" name="alergias" placeholder="Penicilina, AINES...">
              </div>
              <div class="form-group">
                <label>¿Cómo nos conoció?</label>
                <select name="como_nos_conocio">
                  <option value="">Seleccionar</option>
                  <option>Recomendación</option><option>Redes sociales</option><option>Google</option>
                  <option>Sitio web</option><option>Otro</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Antecedentes -->
        <div class="form-card">
          <div class="form-card__header"><span class="form-card__title">📋 Antecedentes</span></div>
          <div class="form-card__body">
            <div class="form-grid">
              <div class="form-group form-group--full">
                <label>Antecedentes Heredofamiliares</label>
                <textarea name="antecedentes_heredofamiliares" rows="3" placeholder="DM, HTA, Cáncer en familiares de primer grado..."></textarea>
              </div>
              <div class="form-group form-group--full">
                <label>Antecedentes Personales Patológicos</label>
                <textarea name="antecedentes_personales_patologicos" rows="3" placeholder="Enfermedades crónicas, hospitalizaciones previas..."></textarea>
              </div>
              <div class="form-group form-group--full">
                <label>Antecedentes Quirúrgicos</label>
                <textarea name="antecedentes_quirurgicos" rows="2" placeholder="Cirugías previas y año..."></textarea>
              </div>
              <div class="form-group form-group--full">
                <label>Antecedentes Personales No Patológicos</label>
                <textarea name="antecedentes_personales_no_patologicos" rows="2" placeholder="Tabaquismo, alcoholismo, toxicomanías, actividad física..."></textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- Historia Gineco-Obstétrica -->
        <div class="form-card">
          <div class="form-card__header"><span class="form-card__title">🌸 Historia Gineco-Obstétrica</span></div>
          <div class="form-card__body">
            <div class="form-grid form-grid--3">
              <div class="form-group">
                <label>Menarca (edad)</label>
                <input type="number" name="menarca" min="8" max="18" placeholder="12">
              </div>
              <div class="form-group">
                <label>Ritmo Menstrual</label>
                <input type="text" name="ritmo_menstrual" placeholder="28 x 4">
              </div>
              <div class="form-group">
                <label>Dismenorrea</label>
                <select name="dismenorrea">
                  <option value="0">No</option>
                  <option value="1">Sí</option>
                </select>
              </div>
              <div class="form-group">
                <label>FUM (fecha última menstruación)</label>
                <input type="date" name="fum">
              </div>
              <div class="form-group">
                <label>Inicio de vida sexual (edad)</label>
                <input type="number" name="inicio_vida_sexual" min="10" max="50" placeholder="18">
              </div>
              <div class="form-group">
                <label>Número de parejas sexuales</label>
                <input type="number" name="num_parejas_sexuales" min="0" placeholder="1">
              </div>
              <div class="form-group">
                <label>Gestas</label>
                <input type="number" name="gestas" min="0" value="0">
              </div>
              <div class="form-group">
                <label>Partos</label>
                <input type="number" name="partos" min="0" value="0">
              </div>
              <div class="form-group">
                <label>Cesáreas</label>
                <input type="number" name="cesareas" min="0" value="0">
              </div>
              <div class="form-group">
                <label>Abortos</label>
                <input type="number" name="abortos" min="0" value="0">
              </div>
              <div class="form-group">
                <label>Vivos</label>
                <input type="number" name="vivos" min="0" value="0">
              </div>
              <div class="form-group">
                <label>Método anticonceptivo</label>
                <select name="metodo_anticonceptivo">
                  <option value="">Ninguno</option>
                  <option>Hormonal oral</option><option>Inyectable</option><option>Implante subdérmico</option>
                  <option>DIU hormonal</option><option>DIU cobre</option><option>Condón</option>
                  <option>Quirúrgico (OTB)</option><option>Natural</option><option>Otro</option>
                </select>
              </div>
              <div class="form-group">
                <label>Último Papanicolau</label>
                <input type="date" name="ultimo_papanicolau">
              </div>
              <div class="form-group">
                <label>Resultado Papanicolau</label>
                <select name="resultado_papanicolau">
                  <option value="">—</option>
                  <option>Normal</option><option>ASCUS</option><option>LIEBG</option><option>LIEAG</option>
                  <option>NIC I</option><option>NIC II</option><option>NIC III</option><option>Pendiente</option>
                </select>
              </div>
              <div class="form-group">
                <label>Última Colposcopía</label>
                <input type="date" name="ultima_colposcopia">
              </div>
              <div class="form-group">
                <label>Resultado Colposcopía</label>
                <input type="text" name="resultado_colposcopia" placeholder="Normal / Anormal...">
              </div>
              <div class="form-group">
                <label>Vacuna VPH</label>
                <select name="vacuna_vph">
                  <option value="0">No</option>
                  <option value="1">Sí</option>
                </select>
              </div>
              <div class="form-group form-group--full">
                <label>Notas adicionales</label>
                <textarea name="notas_adicionales" rows="2"></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="form-actions" style="background:transparent; border:none; padding:0 0 32px;">
          <a href="/platform/pacientes.html" class="btn btn--outline">Cancelar</a>
          <button type="submit" class="btn btn--primary" id="submitBtn">Registrar Paciente</button>
        </div>

      </form>
    </div>
  </div>
</div>

<script src="/js/platform-api.js"></script>
<script>
checkAuth(); renderUser(); loadWebBadge();

document.getElementById('pacienteForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Guardando...';

  const form = e.target;
  const data = {};
  new FormData(form).forEach((v, k) => { data[k] = v; });

  try {
    const result = await API.post('/pacientes', data);
    toast('Paciente registrada correctamente', 'ok');
    setTimeout(() => window.location.href = `/platform/paciente.html?id=${result.id}`, 800);
  } catch(err) {
    toast(err.message || 'Error al registrar', 'err');
    btn.disabled = false; btn.textContent = 'Registrar Paciente';
  }
});
</script>
</body>
</html>
