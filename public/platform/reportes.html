<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYNARE · Reportes</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/platform.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <header class="topbar">
      <span class="topbar__title">Reportes y Estadísticas</span>
    </header>

    <div class="content">

      <!-- KPIs globales -->
      <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr); margin-bottom: 28px">
        <div class="stat-card stat-card--accent">
          <div class="stat-card__label">Total pacientes</div>
          <div class="stat-card__value" id="kpiPacientes">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Consultas totales</div>
          <div class="stat-card__value" id="kpiConsultas">—</div>
        </div>
        <div class="stat-card stat-card--green">
          <div class="stat-card__label">Ingresos totales</div>
          <div class="stat-card__value" id="kpiIngresos">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Embarazos activos</div>
          <div class="stat-card__value" id="kpiEmbarazos">—</div>
        </div>
      </div>

      <!-- Gráficas principales -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px">

        <div class="chart-wrap">
          <h3>Ingresos mensuales (últimos 12 meses)</h3>
          <canvas id="chartIngresos" height="200"></canvas>
        </div>

        <div class="chart-wrap">
          <h3>Pacientes nuevas por mes</h3>
          <canvas id="chartPacientes" height="200"></canvas>
        </div>

      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px">

        <div class="chart-wrap">
          <h3>Citas por tipo</h3>
          <canvas id="chartTipos" height="220"></canvas>
        </div>

        <div class="chart-wrap">
          <h3>Diagnósticos más frecuentes</h3>
          <div id="chartDiagnosticos" style="max-height:260px; overflow-y:auto"></div>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="/js/platform-api.js"></script>
<script>
checkAuth();
renderSidebar('reportes');
loadAllBadges();

const PLUM = '#4B1040';
const ROSE = '#C4A0B8';
const GREEN = '#66bb6a';
const COLORS = ['#4B1040','#C4A0B8','#9B5A8A','#6B2A5E','#F0E4EC','#2e7d32','#0277bd','#e65100','#6a1b9a','#00838f'];

async function cargarReportes() {
  try {
    const [resumen, ingMensual, pacMensual, citasTipo, diagnosticos] = await Promise.all([
      API.get('/reportes/resumen'),
      API.get('/cobros/mensual'),
      API.get('/reportes/pacientes-mensual'),
      API.get('/reportes/citas-tipo'),
      API.get('/reportes/diagnosticos'),
    ]);

    // KPIs
    document.getElementById('kpiPacientes').textContent = resumen.totalPacientes.toLocaleString();
    document.getElementById('kpiConsultas').textContent = resumen.totalConsultas.toLocaleString();
    document.getElementById('kpiIngresos').textContent = formatMXN(resumen.totalIngresos);
    document.getElementById('kpiEmbarazos').textContent = resumen.totalEmbarazos;

    // Generar etiquetas para 12 meses
    const meses = [];
    const hoy = new Date();
    for (let i = 11; i >= 0; i--) {
      const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
      meses.push(d.toISOString().slice(0, 7));
    }

    // Chart ingresos
    const ingMap = Object.fromEntries(ingMensual.map(r => [r.mes, r.total]));
    new Chart(document.getElementById('chartIngresos'), {
      type: 'bar',
      data: {
        labels: meses.map(mesLabel),
        datasets: [{
          label: 'Ingresos (MXN)',
          data: meses.map(m => ingMap[m] || 0),
          backgroundColor: PLUM + 'cc',
          borderColor: PLUM,
          borderWidth: 1,
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true, plugins: { legend: { display: false } },
        scales: { y: { ticks: { callback: v => `$${(v/1000).toFixed(0)}k` } } }
      }
    });

    // Chart pacientes nuevas
    const pacMap = Object.fromEntries(pacMensual.map(r => [r.mes, r.total]));
    new Chart(document.getElementById('chartPacientes'), {
      type: 'line',
      data: {
        labels: meses.map(mesLabel),
        datasets: [{
          label: 'Pacientes nuevas',
          data: meses.map(m => pacMap[m] || 0),
          borderColor: '#9c27b0',
          backgroundColor: '#9c27b026',
          fill: true,
          tension: 0.4,
          pointBackgroundColor: '#9c27b0',
          pointRadius: 4,
        }]
      },
      options: {
        responsive: true, plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
      }
    });

    // Chart tipos de cita (doughnut)
    const tipoLabels = {
      primera_vez: 'Primera vez', seguimiento: 'Seguimiento',
      urgencia: 'Urgencia', colposcopia: 'Colposcopía', ultrasonido: 'Ultrasonido'
    };
    new Chart(document.getElementById('chartTipos'), {
      type: 'doughnut',
      data: {
        labels: citasTipo.map(r => tipoLabels[r.tipo] || r.tipo),
        datasets: [{
          data: citasTipo.map(r => r.total),
          backgroundColor: COLORS.slice(0, citasTipo.length),
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'right', labels: { font: { size: 12 }, boxWidth: 14 } } }
      }
    });

    // Diagnósticos frecuentes — tabla simple
    const diagDiv = document.getElementById('chartDiagnosticos');
    if (!diagnosticos.length) {
      diagDiv.innerHTML = '<div class="empty-state" style="padding:24px"><p>Sin datos de diagnósticos aún</p></div>';
    } else {
      const max = diagnosticos[0].total;
      diagDiv.innerHTML = diagnosticos.map((d, i) => `
        <div style="display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--gray-100)">
          <div style="font-size:11px; color:var(--gray-400); width:18px; text-align:center">${i+1}</div>
          <div style="flex:1; min-width:0">
            <div style="font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${d.diagnostico}</div>
            <div style="height:4px; border-radius:2px; background:${PLUM}; width:${Math.round(d.total/max*100)}%; margin-top:4px; opacity:0.7"></div>
          </div>
          <div style="font-size:13px; font-weight:600; color:var(--plum); width:30px; text-align:right">${d.total}</div>
        </div>
      `).join('');
    }

  } catch(e) { console.error(e); }
}

cargarReportes();
</script>
</body>
</html>
