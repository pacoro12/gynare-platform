<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYNARE · Nueva Cita</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/platform.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar__brand"><div class="sidebar__brand-name">GYNARE</div><div class="sidebar__brand-sub">Clínica de la Mujer</div></div>
    <nav class="sidebar__nav">
      <div class="sidebar__section">Principal</div>
      <a href="/platform/dashboard.html" class="sidebar__link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>Dashboard</a>
      <a href="/platform/citas.html" class="sidebar__link active"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="11.5" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M5 1.5v3M11 1.5v3M1.5 7h13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Agenda</a>
      <a href="/platform/solicitudes.html" class="sidebar__link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v3.5l2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Solicitudes Web<span class="sidebar__badge" id="webBadge" style="display:none">0</span></a>
      <div class="sidebar__section">Pacientes</div>
      <a href="/platform/pacientes.html" class="sidebar__link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M2 14c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Pacientes</a>
      <a href="/platform/nueva-paciente.html" class="sidebar__link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="5.5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M1 14c0-3.31 2.69-6 6-6M11 10v4M9 12h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Nueva Paciente</a>
    </nav>
    <div class="sidebar__user"><div class="sidebar__user-avatar" id="sidebarAvatar">D</div><div><div class="sidebar__user-name" id="sidebarUserName">Cargando...</div><div class="sidebar__user-role" id="sidebarUserRole">Médico</div></div><button class="sidebar__logout" onclick="logout()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <span class="topbar__title">Nueva Cita</span>
      <div class="topbar__actions"><a href="/platform/citas.html" class="btn btn--outline btn--sm">← Cancelar</a></div>
    </header>
    <div class="content" style="max-width:600px">
      <form id="citaForm">
        <div class="form-card">
          <div class="form-card__header"><span class="form-card__title">📅 Datos de la Cita</span></div>
          <div class="form-card__body">
            <div class="form-grid form-grid--2">
              <div class="form-group">
                <label>Paciente (buscar)</label>
                <input type="text" id="searchPaciente" placeholder="Buscar por nombre..." autocomplete="off">
                <div id="searchResults" style="display:none; position:absolute; background:white; border:1px solid var(--gray-100); border-radius:8px; box-shadow:var(--shadow-md); z-index:10; max-height:200px; overflow-y:auto; width:100%"></div>
                <input type="hidden" id="paciente_id" name="paciente_id">
              </div>
              <div class="form-group">
                <label>Tipo de consulta</label>
                <select name="tipo">
                  <option value="primera_vez">Primera vez</option>
                  <option value="seguimiento">Seguimiento</option>
                  <option value="colposcopia">Colposcopía</option>
                  <option value="ultrasonido">Ultrasonido</option>
                  <option value="urgencia">Urgencia</option>
                </select>
              </div>
              <div class="form-group" style="position:relative">
                <label>Fecha *</label>
                <input type="date" name="fecha" id="fechaCita" required>
              </div>
              <div class="form-group">
                <label>Hora *</label>
                <select name="hora" id="horaCita" required>
                  <option value="">Selecciona fecha primero</option>
                </select>
              </div>
              <div class="form-group">
                <label>Duración (min)</label>
                <select name="duracion_min">
                  <option value="30">30 min</option>
                  <option value="45">45 min</option>
                  <option value="60">1 hora</option>
                  <option value="90">1.5 horas</option>
                </select>
              </div>
              <div class="form-group form-group--full">
                <label>Motivo / Notas internas</label>
                <textarea name="motivo" rows="2" placeholder="Motivo de la cita..."></textarea>
              </div>
            </div>
          </div>
          <div class="form-actions">
            <a href="/platform/citas.html" class="btn btn--outline">Cancelar</a>
            <button type="submit" class="btn btn--primary" id="submitBtn">Guardar Cita</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="/js/platform-api.js"></script>
<script>
checkAuth(); renderUser(); loadWebBadge();

const params = new URLSearchParams(location.search);
const preloadPacienteId = params.get('paciente_id');

// Precargar paciente si viene en URL
if (preloadPacienteId) {
  API.get(`/pacientes/${preloadPacienteId}`).then(p => {
    const nombre = `${p.nombre} ${p.apellido_paterno} ${p.apellido_materno || ''}`.trim();
    document.getElementById('searchPaciente').value = nombre;
    document.getElementById('paciente_id').value = p.id;
  });
}

// Búsqueda de paciente
let busqTimer;
document.getElementById('searchPaciente').addEventListener('input', (e) => {
  clearTimeout(busqTimer);
  busqTimer = setTimeout(() => buscarPaciente(e.target.value), 300);
});

async function buscarPaciente(q) {
  if (q.length < 2) { document.getElementById('searchResults').style.display = 'none'; return; }
  try {
    const data = await API.get(`/pacientes?q=${encodeURIComponent(q)}&limit=8`);
    const div = document.getElementById('searchResults');
    if (!data.pacientes.length) { div.style.display = 'none'; return; }
    div.innerHTML = data.pacientes.map(p => `
      <div onclick="selPaciente(${p.id}, '${p.nombre} ${p.apellido_paterno} ${p.apellido_materno || ''}')"
        style="padding:10px 14px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--gray-100)"
        onmouseenter="this.style.background='var(--gray-50)'" onmouseleave="this.style.background=''">
        ${p.nombre} ${p.apellido_paterno} ${p.apellido_materno || ''}
        <span style="color:var(--gray-400); font-size:12px"> · ${p.telefono || 'Sin tel.'}</span>
      </div>
    `).join('');
    div.style.display = 'block';
  } catch { }
}

function selPaciente(id, nombre) {
  document.getElementById('paciente_id').value = id;
  document.getElementById('searchPaciente').value = nombre.trim();
  document.getElementById('searchResults').style.display = 'none';
}

document.addEventListener('click', e => {
  if (!e.target.closest('#searchPaciente')) document.getElementById('searchResults').style.display = 'none';
});

// Horarios
const fechaInput = document.getElementById('fechaCita');
const horaSelect = document.getElementById('horaCita');
const hoy = new Date().toISOString().split('T')[0];
fechaInput.setAttribute('min', hoy);

fechaInput.addEventListener('change', async () => {
  const fecha = fechaInput.value;
  if (!fecha) return;
  horaSelect.innerHTML = '<option>Cargando...</option>';
  horaSelect.disabled = true;

  // Usar API pública para horarios disponibles
  const resp = await fetch(`/api/publica/disponibilidad?fecha=${fecha}`);
  const data = await resp.json();

  if (data.disponibles.length === 0) {
    horaSelect.innerHTML = '<option value="">No hay horarios disponibles</option>';
  } else {
    horaSelect.innerHTML = '<option value="">Selecciona un horario</option>' +
      data.disponibles.map(h => `<option value="${h}">${formatHora(h)}</option>`).join('');
  }
  horaSelect.disabled = false;
});

document.getElementById('citaForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Guardando...';

  const data = { paciente_id: document.getElementById('paciente_id').value || null };
  new FormData(e.target).forEach((v, k) => { if (k !== 'paciente_id') data[k] = v; });

  try {
    const result = await API.post('/citas', data);
    toast('Cita registrada', 'ok');
    setTimeout(() => window.location.href = '/platform/citas.html', 600);
  } catch(err) {
    toast(err.message || 'Error al crear cita', 'err');
    btn.disabled = false; btn.textContent = 'Guardar Cita';
  }
});
</script>
</body>
</html>
